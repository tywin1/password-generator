<html>
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
    <div class="pw-container">
        <div class="pw-content">
            <p id="generate-text">Generate a</p>
            <p id="random-text">random password</p>
            <p id="never-text">Never use an insecure password again.</p>
            <button id="pwButton" class="pw-button">Generate passwords</button>
            <hr class="divider-line">

                <div class="pw-box">
                    <div class="pw-block">
                        <div id="password-el1" class="pw-text"></div>
                            <div class="icon-container">
                                <img src="copy.png" class="copy-btn" data-target="password-el1" style="cursor: pointer;">
                            </div>
                        </div>

                    <div class="pw-block">
                        <div id="password-el2" class="pw-text"></div>
                            <div class="icon-container">
                                <image src="copy.png" class="copy-btn" data-target="password-el2" style="cursor: pointer;">
                            </div>
                        </div>
                    </div>                
                </div>
        </div>
    </div>
        <script src="index.js"></script>
    </body>
</html>
